<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Nature Simulation – Grundgerüst</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: radial-gradient(circle at top, #1b2735 0, #090a0f 55%, #000 100%);
      color: #f5f5f5;
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }
    #app {
      position: relative;
      width: 100%;
      height: 100%;
    }
    canvas {
      width: 100%;
      height: 100%;
      display: block;
    }
    .ui-overlay {
      position: absolute;
      top: 1rem;
      left: 1rem;
      padding: 0.75rem 1rem;
      background: rgba(0, 0, 0, 0.55);
      border-radius: 0.75rem;
      backdrop-filter: blur(12px);
      box-shadow: 0 10px 30px rgba(0, 0, 0, 0.4);
      border: 1px solid rgba(255, 255, 255, 0.1);
    }
    .ui-overlay h1 {
      margin: 0 0 0.25rem 0;
      font-size: 1rem;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #7ee0ff;
    }
    .ui-overlay p {
      margin: 0 0 0.5rem 0;
      font-size: 0.8rem;
      opacity: 0.85;
    }
    .ui-row {
      display: flex;
      gap: 0.5rem;
      align-items: center;
      margin-bottom: 0.5rem;
    }
    .ui-row label {
      font-size: 0.75rem;
      opacity: 0.8;
      min-width: 4.5rem;
    }
    .ui-row select,
    .ui-row input[type="range"] {
      flex: 1;
      accent-color: #7ee0ff;
      background: rgba(255,255,255,0.04);
      color: #f5f5f5;
      border-radius: 0.4rem;
      border: 1px solid rgba(255,255,255,0.1);
      font-size: 0.75rem;
    }
    .ui-meta {
      font-size: 0.7rem;
      opacity: 0.7;
      display: flex;
      justify-content: space-between;
      gap: 0.75rem;
      margin-top: 0.4rem;
    }
  </style>
</head>
<body>
  <div id="app">
    <canvas id="sim-canvas"></canvas>
    <div class="ui-overlay">
      <h1>Nature Sim – Core</h1>
      <p>Grundgerst fr Landschaft, Tiere, Wetter & Physics.</p>
      <div class="ui-row">
        <label for="preset">Preset</label>
        <select id="preset">
          <option value="clear-morning">Clear Morning</option>
          <option value="sunset">Sunset</option>
          <option value="storm">Storm</option>
        </select>
      </div>
      <div class="ui-row">
        <label for="time-of-day">Time</label>
        <input id="time-of-day" type="range" min="0" max="24" step="0.25" value="9" />
      </div>
      <div class="ui-row">
        <label for="weather-intensity">Weather</label>
        <input id="weather-intensity" type="range" min="0" max="1" step="0.05" value="0.0" />
      </div>
      <div class="ui-meta">
        <span id="meta-fps">FPS: --</span>
        <span id="meta-entities">Entities: --</span>
      </div>
    </div>
  </div>
  <script type="module" src="./src/main.js"></script>
</body>
</html>
